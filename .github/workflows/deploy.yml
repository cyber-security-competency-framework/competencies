name: Deploy to GitHub Pages

on:
  push:
    branches: [production]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Build lib
        working-directory: lib
        run: yarn install && yarn build

      - name: Build app
        working-directory: app
        run: yarn install && node --openssl-legacy-provider node_modules/.bin/webpack --mode production

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/dist
          mkdir -p deploy/images
          mkdir -p deploy/src
          cp app/index.html deploy/
          cp app/dist/bundle.js deploy/dist/
          cp -r app/images/. deploy/images/
          cp app/src/COMPETENCIES.md deploy/src/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: cyber-security-competency-framework/cyber-security-competency-framework.github.io
          publish_branch: main
          publish_dir: ./deploy
